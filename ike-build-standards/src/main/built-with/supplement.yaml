# IKE Network — Platform-wide Built With supplement
# ──────────────────────────────────────────────────────────────────
# This is the CANONICAL platform-wide supplement, shipped with
# ike-build-standards as a classified artifact (#340) so external
# consumers get curated narrative on their built-with.html page
# WITHOUT having to author their own supplement.yaml. Each consumer
# can override or supplement with a local
# src/main/built-with/supplement.yaml at their reactor root — the
# walk-up resolver finds the local copy first; the unpacked
# classifier is the fallback.
#
# This file is also consumed in-place by the ike-platform reactor
# (its src/main/built-with/supplement.yaml is a copy / superset of
# this content).
#
# Curated narrative covering components that mechanical reports
# (bom.json, licenses.html) can't see: external services, fonts
# inside classifier ZIPs, frontend assets bundled in rendered HTML,
# the Maven Site skin, runtime PDF renderers shelled out to native
# binaries, etc.
#
# Read by ike:built-with (ike-issues#336). Per-module renders look
# for the supplement in this order:
#   1. ${project.basedir}/src/main/built-with/supplement.yaml
#   2. walk up from project basedir looking for the same path
#   3. ${project.build.directory}/built-with-supplement.yaml
#      (unpacked from this classifier at pre-site phase)
#
# Schema:
#   schema:        manifest format version (currently 1)
#   sections[]:
#     heading:     section title in the rendered page
#     components[]:
#       name:      component display name (required)
#       url:       link target (optional)
#       license:   SPDX expression (preferred) or prose
#       role:      one-line description of how this project uses it
#
# Keep entries grouped by section, with each section ordered by
# license then alphabetically. Use SPDX expressions verbatim where
# the license has a canonical SPDX identifier.

schema: 1

sections:

  - heading: Java language and runtime
    components:
      - name: OpenJDK 25
        url: https://openjdk.org/
        license: GPL-2.0-only WITH Classpath-exception-2.0
        role: >
          The Java SDK and runtime targeted by IKE consumers. Build
          uses --enable-preview for opt-in language preview features.
          The Classpath Exception is what makes OpenJDK usable from
          non-GPL consumers without infecting their licensing.

  - heading: Maven build infrastructure
    components:
      - name: Apache Maven core
        url: https://maven.apache.org/
        license: Apache-2.0
        role: >
          Build orchestration. ike-parent is a Maven 4
          (modelVersion 4.1.0) POM consumed by every project that
          wants IKE conventions.
      - name: Maven Site Plugin
        url: https://maven.apache.org/plugins/maven-site-plugin/
        license: Apache-2.0
        role: Site rendering and report generation.
      - name: Maven Project Info Reports Plugin
        url: https://maven.apache.org/plugins/maven-project-info-reports-plugin/
        license: Apache-2.0
        role: >
          Produces dependencies.html, plugins.html, dependency-info.html
          and the rest of the standard reports under Project Reports.
      - name: Maven Dependency Plugin
        url: https://maven.apache.org/plugins/maven-dependency-plugin/
        license: Apache-2.0
        role: >
          Used by ike-parent to unpack the site-theme,
          asciidoctorconfig, and font classified artifacts at
          build phases.
      - name: Maven Compiler / Surefire / Failsafe / Jar / Resources / Install / Deploy / Clean Plugins
        url: https://maven.apache.org/plugins/
        license: Apache-2.0
        role: >
          Standard Maven lifecycle plugins, version-pinned in
          ike-parent pluginManagement so consumers inherit consistent
          versions.
      - name: Maven Source / Javadoc / GPG Plugins
        url: https://maven.apache.org/plugins/
        license: Apache-2.0
        role: >
          Source jar, javadoc, and (with the BC signer) signing
          during release.
      - name: CycloneDX Maven Plugin
        url: https://github.com/CycloneDX/cyclonedx-maven-plugin
        license: Apache-2.0
        role: >
          Generates the SBOM (bom.json + bom.xml) at package phase
          per ike-issues#333.
      - name: wagon-ssh-external
        url: https://maven.apache.org/wagon/wagon-providers/wagon-ssh-external/
        license: Apache-2.0
        role: >
          Provides the scpexe:// protocol for site:deploy to the
          internal mirror at ike.komet.sh. Registered as a Maven
          build extension (.mvn/extensions.xml). Distributed to
          consumer projects via the ike-build-standards scaffold
          (ike-issues#338).

  - heading: Cryptographic signing
    components:
      - name: Bouncy Castle (bcprov-jdk18on, bcpg-jdk18on)
        url: https://www.bouncycastle.org/
        license: MIT
        role: >
          OpenPGP signing engine activated via <signer>bc</signer>
          on maven-gpg-plugin. Required because the native gpg
          signer serializes through gpg-agent and breaks parallel
          reactor builds. Bouncy Castle distributes under an
          MIT-X11 adaptation; SPDX classifies as MIT.

  - heading: Java annotation processing and bytecode
    components:
      - name: ASM 9.x
        url: https://asm.ow2.io/
        license: BSD-3-Clause
        role: >
          Bytecode manipulation library. Pinned at the version
          compatible with the --release 25 compiler target so
          annotation processors on the build classpath don't fail
          on newer class file versions.
      - name: Project Lombok (consumer-optional)
        url: https://www.lombok.org/
        license: MIT
        role: >
          Annotation processor for boilerplate reduction. ike-bom
          manages the version; consumers opt in.

  - heading: Logging, JSON, and runtime utilities (BOM-managed)
    components:
      - name: SLF4J API
        url: https://www.slf4j.org/
        license: MIT
        role: Logging facade.
      - name: Logback Classic / Core
        url: https://logback.qos.ch/
        license: EPL-1.0 OR LGPL-2.1-or-later
        role: Default SLF4J implementation.
      - name: Jackson (core, databind, annotations, jsr310, yaml)
        url: https://github.com/FasterXML/jackson
        license: Apache-2.0
        role: JSON / YAML serialization stack.
      - name: SnakeYAML
        url: https://www.snakeyaml.org/
        license: Apache-2.0
        role: Underlying YAML parser used by Jackson YAML datatype.
      - name: Apache Commons Lang / Commons IO
        url: https://commons.apache.org/
        license: Apache-2.0
        role: Standard utility libraries surfaced through the BOM.
      - name: Guava
        url: https://github.com/google/guava
        license: Apache-2.0
        role: Collections and concurrency utilities, BOM-managed.

  - heading: Test frameworks (BOM-managed)
    components:
      - name: JUnit 5 (Jupiter API, Engine, Platform)
        url: https://junit.org/junit5/
        license: EPL-2.0
        role: Unit and integration test framework.
      - name: AssertJ Core
        url: https://assertj.github.io/
        license: Apache-2.0
        role: Fluent assertion library.
      - name: Mockito Core, Mockito JUnit Jupiter
        url: https://site.mockito.org/
        license: MIT
        role: Mocking framework for unit tests.
      - name: Testcontainers
        url: https://www.testcontainers.org/
        license: MIT
        role: >
          Container-orchestrated integration tests, used by IKE
          projects that need PostgreSQL, Selenium, etc.
          BOM-managed for consumers that opt in.

  - heading: AsciiDoc and Maven Site (consumed via ike-parent)
    components:
      - name: AsciidoctorJ
        url: https://asciidoctor.org/
        license: MIT
        role: >
          ike-parent activates the AsciiDoc pipeline through
          profiles when a consumer module has src/docs/asciidoc/
          or src/site/asciidoc/. The toolchain itself lives in
          ike-docs (see that reactor's built-with for full detail).
      - name: AsciidoctorJ PDF / Diagram
        url: https://github.com/asciidoctor/
        license: MIT
        role: PDF rendering and diagram support for AsciiDoc.
      - name: JRuby
        url: https://www.jruby.org/
        license: EPL-2.0 OR GPL-2.0-only OR LGPL-2.1-only
        role: >
          Embedded Ruby runtime that Asciidoctor itself runs on.
          Pulled in transitively by AsciidoctorJ. The OR is
          consumer's choice — for downstream users including IKE,
          EPL-2.0 is the most redistribution-friendly of the three.
      - name: Sentry Maven Skin
        url: https://github.com/sentrysoftware/maven-skins
        license: Apache-2.0
        role: >
          The Maven Site skin every published page uses. Provides
          the navigation chrome, breadcrumbs, and template
          structure. The IKE Forest theme overlays Sentry's
          defaults via the site-theme classifier produced by
          ike-build-standards (#318).
      - name: Prism
        url: https://prismjs.com/
        license: MIT
        role: Syntax highlighter for code blocks in rendered HTML.
      - name: Font Awesome (free tier)
        url: https://fontawesome.com/
        license: CC-BY-4.0 AND OFL-1.1 AND MIT
        role: >
          Icon set used in rendered HTML. Different files under
          different licenses — icons under CC-BY-4.0; fonts under
          OFL-1.1; JS under MIT.
