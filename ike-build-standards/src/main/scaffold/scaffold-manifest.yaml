# IKE scaffold manifest — shipped by ike-build-standards (#222).
#
# Read by the `ike:scaffold-draft`, `ike:scaffold-publish`, and
# `ike:scaffold-revert` goals in ike-maven-plugin. Each entry below
# declares:
#
#   - dest   : where the file lands. "~/" prefix ⇒ user scope.
#              A bare relative path ⇒ project scope (resolved
#              against {project.root}).
#   - scope  : user | project (dispatch selector)
#   - tier   : tool-owned | tracked | tracked-block | model-managed
#   - source : path inside this zip (all file-based tiers)
#   - extras : tier-specific extras (block markers, model ensure
#              specs, etc.)
#
# Keep this file alphabetised by `dest` within each scope so diffs
# stay easy to read.

schema: 1
standards-version: "${project.version}"
files:

  # ── project scope ────────────────────────────────────────────────

  # IKE-managed .gitignore block — inserted between markers. The
  # TrackedBlockTierHandler leaves anything outside the block alone
  # so users can add their own patterns.
  - dest: .gitignore
    scope: project
    tier: tracked-block
    source: tracked/gitignore.ike-block
    block-begin: "# BEGIN ike-managed"
    block-end: "# END ike-managed"

  # Parallel build + coloured output by default. Tracked (not
  # tool-owned) so developers can tune it per-project without the
  # next scaffold-publish silently reverting the change.
  - dest: .mvn/maven.config
    scope: project
    tier: tracked
    source: tracked/maven.config

  # ── user scope ───────────────────────────────────────────────────

  # VCS Bridge hooks live under ~/.git-hooks/ and activate once
  # `git config --global core.hooksPath ~/.git-hooks` is set
  # (handled by the ike:setup goal, or by a future git-config
  # model-managed entry in this manifest).

  - dest: ~/.git-hooks/post-commit
    scope: user
    tier: tool-owned
    source: tool-owned/hooks/post-commit

  - dest: ~/.git-hooks/pre-commit
    scope: user
    tier: tool-owned
    source: tool-owned/hooks/pre-commit

  - dest: ~/.git-hooks/pre-push
    scope: user
    tier: tool-owned
    source: tool-owned/hooks/pre-push
