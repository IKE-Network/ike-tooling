# IKE scaffold manifest — shipped by ike-build-standards (#222).
#
# Read by the `ike:scaffold-draft`, `ike:scaffold-publish`, and
# `ike:scaffold-revert` goals in ike-maven-plugin. Each entry below
# declares:
#
#   - dest   : where the file lands. "~/" prefix ⇒ user scope.
#              A bare relative path ⇒ project scope (resolved
#              against {project.root}).
#   - scope  : user | project (dispatch selector)
#   - tier   : tool-owned | tracked | tracked-block | model-managed
#   - source : path inside this zip (all file-based tiers)
#   - extras : tier-specific extras (block markers, model ensure
#              specs, etc.)
#
# Keep this file alphabetised by `dest` within each scope so diffs
# stay easy to read.

schema: 1
standards-version: "${project.version}"

# IKE-foundation version pins (#345). Picking up this scaffold gives
# the consumer the tested-together compatibility snapshot of ike-parent
# + standard properties that ike-tooling N saw at its release moment.
#
# ike-tooling.version is auto-filtered from ${project.version} (this
# zip's version IS the ike-tooling version). ike-parent, ike-docs, and
# ike-platform are the latest-released versions at the moment
# ike-tooling N was cut — the ike:release-publish foundation bake
# (#414) resolves them from the remote repository and rewrites this
# block automatically, so no manual edit is needed.
foundation:
  parent:
    groupId: network.ike.platform
    artifactId: ike-parent
    version: "113"
  properties:
    ike-tooling.version: "${project.version}"
    ike-docs.version: "78"
    ike-platform.version: "113"

files:

  # ── project scope ────────────────────────────────────────────────

  # IKE-managed .gitignore block — inserted between markers. The
  # TrackedBlockTierHandler leaves anything outside the block alone
  # so users can add their own patterns.
  #
  # Whitelist-mode awareness (workspace-style .gitignore that ignores
  # everything by default and whitelists individual entries): when
  # the destination's first non-comment, non-blank line is a bare
  # `*` or `**`, the handler substitutes `whitelist-block-content`
  # for the blacklist source. The substitute lists `!pattern` entries
  # for every scaffold-tracked file that needs to escape the catch-all
  # ignore — keep this aligned with the entries below that have
  # `scope: project` and a file-based tier (`tracked`,
  # `tracked-block`, or `tool-owned`, e.g. the Maven wrapper).
  - dest: .gitignore
    scope: project
    tier: tracked-block
    source: tracked/gitignore.ike-block
    block-begin: "# BEGIN ike-managed"
    block-end: "# END ike-managed"
    whitelist-block-content: |
      # Scaffold-tracked files (whitelisted out of the catch-all ignore)
      !.ike/
      !.ike/scaffold.lock
      !.mvn/
      !.mvn/extensions.xml
      !.mvn/maven.config
      !.mvn/wrapper/
      !.mvn/wrapper/maven-wrapper.properties
      !mvnw
      !mvnw.cmd

  # Maven build extensions — registered at startup so the Maven core
  # classpath has them. Currently provides wagon-ssh-external for
  # the scpexe:// protocol used by mvn site:deploy (#338). Tracked
  # so consumers can add additional extensions per-project without
  # the next scaffold-publish silently reverting them.
  - dest: .mvn/extensions.xml
    scope: project
    tier: tracked
    source: tracked/extensions.xml

  # Parallel build + coloured output by default. Tracked (not
  # tool-owned) so developers can tune it per-project without the
  # next scaffold-publish silently reverting the change.
  - dest: .mvn/maven.config
    scope: project
    tier: tracked
    source: tracked/maven.config

  # Maven wrapper — pins the Maven distribution every contributor and
  # IntelliJ build uses (currently 4.0.0-rc-5 via the lightweight
  # `only-script` wrapper, so no `maven-wrapper.jar` is shipped). Made
  # tool-owned, not tracked, so the wrapper version stays consistent
  # fleet-wide: the next scaffold-publish reproduces the shipped set
  # and overwrites any drifted per-repo copy. The properties file and
  # `mvnw.cmd` take the default file mode; `mvnw` is marked
  # `executable` so `./mvnw` runs after publish.
  - dest: .mvn/wrapper/maven-wrapper.properties
    scope: project
    tier: tool-owned
    source: tool-owned/wrapper/maven-wrapper.properties

  # IKE Developer Setup link block — a tracked-block region in the
  # project README that points every contributor at the canonical
  # developer-environment guide (ike-issues#410). The
  # TrackedBlockTierHandler appends the block to an existing README,
  # refreshes it in place when the template changes, and flags it in
  # scaffold-draft when a README is missing it; content outside the
  # markers is the project's own and is never touched.
  - dest: README.md
    scope: project
    tier: tracked-block
    source: tracked/readme.developer-setup
    block-begin: "<!-- BEGIN ike-managed: developer-setup -->"
    block-end: "<!-- END ike-managed: developer-setup -->"

  # Maven wrapper launcher (POSIX). `mode: executable` makes the
  # applier publish it 0755 so `./mvnw` runs; without it the file
  # would land non-executable like every other scaffold-written file.
  - dest: mvnw
    scope: project
    tier: tool-owned
    source: tool-owned/wrapper/mvnw
    mode: executable

  # Maven wrapper launcher (Windows batch). Default file mode — the
  # executable bit is meaningless on Windows and the script is never
  # invoked directly on POSIX.
  - dest: mvnw.cmd
    scope: project
    tier: tool-owned
    source: tool-owned/wrapper/mvnw.cmd

  # ── user scope ───────────────────────────────────────────────────

  # Point git at ~/.git-hooks/ so the VCS-bridge hooks below fire
  # on commit/push. `GitConfigAdapter` treats each declared key as
  # managed: if the user has already set core.hooksPath to anything
  # else, their value wins and we just record the key as
  # user-overridden in the lockfile.
  - dest: ~/.gitconfig
    scope: user
    tier: model-managed
    model: git-config
    ensure:
      core:
        hooksPath: "~/.git-hooks"

  # VCS Bridge hooks live under ~/.git-hooks/. The ~/.gitconfig entry
  # above points core.hooksPath here, but the hooks themselves ship
  # parked: `mode: private` publishes them 0600 (non-executable), so
  # git skips them until a user opts in. They are not yet ready for
  # general use. scaffold-draft surfaces the one-line `chmod +x`
  # activation command (the `activation` note below) so the step is
  # discoverable without being automatic.
  - dest: ~/.git-hooks/post-commit
    scope: user
    tier: tool-owned
    source: tool-owned/hooks/post-commit
    mode: private
    activation: "VCS-bridge hooks are parked (mode 600, inert). Activate with: chmod +x ~/.git-hooks/pre-commit ~/.git-hooks/post-commit ~/.git-hooks/pre-push"

  - dest: ~/.git-hooks/pre-commit
    scope: user
    tier: tool-owned
    source: tool-owned/hooks/pre-commit
    mode: private

  - dest: ~/.git-hooks/pre-push
    scope: user
    tier: tool-owned
    source: tool-owned/hooks/pre-push
    mode: private

  # IKE plugin groups — lets the user run `mvn ike:…` and
  # `mvn ws:…` without fully-qualified coordinates. Existing
  # entries and unrelated settings (servers, profiles, …) are
  # left untouched; a fresh settings.xml is minted if the file
  # doesn't exist yet.
  - dest: ~/.m2/settings.xml
    scope: user
    tier: model-managed
    model: maven-settings-4
    ensure:
      pluginGroups:
        - network.ike.tooling
        - network.ike.platform
        - network.ike.lab
        - network.ike.examples
