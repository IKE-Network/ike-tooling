# Builds the Maven site and deploys to GitHub Pages.
#
# Result: https://ike.network/ike-tooling/
#
# Triggers:
#   - Push to main (automatic on every merge/release)
#   - Manual dispatch (for ad-hoc rebuilds)
name: Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Only one deployment at a time; cancel in-progress if a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Maven 4
        run: |
          MAVEN_VERSION=4.0.0
          curl -sL "https://archive.apache.org/dist/maven/maven-4/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz" \
            | tar xz -C /opt
          echo "/opt/apache-maven-${MAVEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build reactor (install ike-maven-plugin)
        run: mvn install -DskipTests --batch-mode

      - name: Generate site
        run: mvn site site:stage --batch-mode -DtopSiteURL=https://ike.network/ike-tooling

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/staging

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
