      oldGroupId: network.ike
      oldArtifactId: ike-maven-plugin
      newGroupId: network.ike.tooling
  - org.openrewrite.maven.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: network.ike
      oldArtifactId: ike-workspace-model
      newGroupId: network.ike.tooling
