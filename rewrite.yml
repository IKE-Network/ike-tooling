type: specs.openrewrite.org/v1beta/recipe
name: network.ike.MigrateGroupIds
displayName: IKE GroupId Migration
description: >-
  Migrate legacy network.ike groupId references to the reactor-specific
  groupIds (network.ike.tooling and network.ike.pipeline) introduced in
  ike-tooling 70 / ike-pipeline 56. Run with:
  mvn rewrite:run -Drewrite.activeRecipes=network.ike.MigrateGroupIds
recipeList:
  # ── ike-tooling artifacts ────────────────────────────────────
