# IKE Tooling — Built With supplement
# ──────────────────────────────────────────────────────────────────
# Curated narrative covering components that mechanical reports
# (bom.json, licenses.html) can't see. Read by ike:built-with
# (ike-issues#336).

schema: 1

sections:

  - heading: Maven build infrastructure
    components:
      - name: Apache Maven core, build extensions, plugin API
        url: https://maven.apache.org/
        license: Apache-2.0
        role: >
          Build orchestration. ike-tooling consumes maven-api-core,
          maven-api-plugin, maven-api-impl, maven-plugin-tools-
          annotations, and the standard build lifecycle plugins.
      - name: Maven Site Plugin
        url: https://maven.apache.org/plugins/maven-site-plugin/
        license: Apache-2.0
        role: Generates the project Maven Site (this site).
      - name: Maven Project Info Reports Plugin
        url: https://maven.apache.org/plugins/maven-project-info-reports-plugin/
        license: Apache-2.0
        role: >
          Produces dependencies.html, dependency-info.html,
          plugin-management.html, dependency-management.html, and
          the rest of the standard reports under Project Reports.
      - name: Maven Dependency Plugin
        url: https://maven.apache.org/plugins/maven-dependency-plugin/
        license: Apache-2.0
        role: >
          Unpacks classified ZIP artifacts (claude, site-theme,
          asciidoctorconfig, scaffold) into consumer build
          directories.
      - name: Maven Assembly Plugin
        url: https://maven.apache.org/plugins/maven-assembly-plugin/
        license: Apache-2.0
        role: >
          Builds the classified ZIP artifacts produced by
          ike-build-standards.
      - name: Maven Compiler / Surefire / Jar / Resources / Install / Deploy / Clean Plugins
        url: https://maven.apache.org/plugins/
        license: Apache-2.0
        role: Standard Maven lifecycle plugins.
      - name: Maven Source / Javadoc Plugins
        url: https://maven.apache.org/plugins/
        license: Apache-2.0
        role: Source jar and javadoc generation during release.
      - name: Maven GPG Plugin
        url: https://maven.apache.org/plugins/maven-gpg-plugin/
        license: Apache-2.0
        role: >
          Signs release artifacts. Configured to use the bc
          (Bouncy Castle) signer for parallel-safe signing without
          gpg-agent contention.
      - name: CycloneDX Maven Plugin
        url: https://github.com/CycloneDX/cyclonedx-maven-plugin
        license: Apache-2.0
        role: >
          Generates the SBOM (bom.json + bom.xml) at package
          phase per ike-issues#333.

  - heading: Maven Site skin
    components:
      - name: Sentry Maven Skin
        url: https://github.com/sentrysoftware/maven-skins
        license: Apache-2.0
        role: >
          The Maven Site skin applied to every published page.
          Provides the base navigation chrome (header, sidebar,
          breadcrumbs). The IKE Forest theme overlays Sentry's
          defaults via the site-theme classifier produced by
          ike-build-standards (#318).
      - name: Maven Skin Tools
        url: https://github.com/sentrysoftware/maven-skins/tree/main/maven-skin-tools
        license: Apache-2.0
        role: >
          Velocity helper context ($headElement, $bodyElement) used
          by the Sentry skin. Pulled in as a maven-site-plugin
          dependency.
      - name: GraalVM Polyglot, GraalVM JS
        url: https://www.graalvm.org/
        license: GPL-2.0-only WITH Classpath-exception-2.0
        role: >
          Replaces the deprecated Nashorn engine for skin script
          evaluation. Pulled in as a maven-site-plugin dependency.
          Community Edition.
      - name: Prism
        url: https://prismjs.com/
        license: MIT
        role: >
          Syntax highlighter shipped in rendered HTML. Used by
          the AsciiDoc pipeline; per-language CSS is bundled in
          the rendered output.

  - heading: Cryptographic signing
    components:
      - name: Bouncy Castle (bcprov-jdk18on, bcpg-jdk18on)
        url: https://www.bouncycastle.org/
        license: MIT
        role: >
          OpenPGP signing engine used by maven-gpg-plugin's bc
          signer. IKE releases consistently use bc because the
          native gpg signer serializes through gpg-agent and
          breaks parallel reactor builds. SPDX classifies the
          MIT-X11-style BC license as MIT.

  - heading: Test frameworks
    components:
      - name: JUnit 5 (Jupiter, Platform)
        url: https://junit.org/junit5/
        license: EPL-2.0
        role: Unit test framework.
      - name: AssertJ
        url: https://assertj.github.io/
        license: Apache-2.0
        role: Fluent assertion library used in tests.
      - name: Mockito
        url: https://site.mockito.org/
        license: MIT
        role: >
          Mocking framework used in ike-workspace-model tests.

  - heading: Documentation tooling consumed during plugin development
    components:
      - name: Asciidoctor Parser Doxia Module
        url: https://github.com/asciidoctor/asciidoctor-doxia
        license: MIT
        role: >
          Lets maven-site-plugin render the
          src/site/asciidoc/*.adoc files (this page among them)
          as part of site:site.
      - name: JRuby
        url: https://www.jruby.org/
        license: EPL-2.0 OR GPL-2.0-only OR LGPL-2.1-only
        role: >
          Embedded Ruby runtime that the AsciiDoc parser uses.
          Pulled in transitively by the Doxia module. The OR is
          consumer's choice.
