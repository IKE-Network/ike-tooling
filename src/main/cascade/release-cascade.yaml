# release-cascade.yaml — ike-tooling's edges in the IKE release
# cascade (IKE-Network/ike-issues#420).
#
# The cascade is a loosely-coupled distributed system: every
# foundation repo version-controls this file in its own git tree and
# declares ONLY its own edges. No project authors the global ordering
# — the full graph (ike-tooling → ike-docs → ike-platform) is
# assembled by traversing these per-project files.
#
#   upstream   — projects this repo consumes. The canonical
#                version pin is derived mechanically from each
#                upstream's coordinates — no version-property
#                field needed (IKE-Network/ike-issues#496).
#                Post-#526, ike-base-parent no longer carries the
#                IKE-foundation pins, so ike-tooling declares its
#                own ike-java-support pin and adds java-support
#                as an upstream so future cycles auto-bump.
#   downstream — foundation projects that consume this repo; the
#                cascade executor walks forward to each after a
#                release here.

schema: 1

upstream:
  - groupId: network.ike
    artifactId: ike-java-support
    url: https://github.com/IKE-Network/ike-java-support.git

downstream:
  - groupId: network.ike.docs
    artifactId: ike-docs
    url: https://github.com/IKE-Network/ike-docs.git
  - groupId: network.ike.platform
    artifactId: ike-platform
    url: https://github.com/IKE-Network/ike-platform.git
